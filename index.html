<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>twitter</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
    <script
      src="https://kit.fontawesome.com/1286d21307.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="main">
      <div id="leftSide">
        <nav class="left-menu">
          <ul style="list-style-type: none">
            <li>
              <span class="logo"> <i class="fab fa-twitter"></i></span>
            </li>
            <!--  ------------------------------------- logo complate -->
            <li>
              <div class="homecolor">
                <span><i class="fas fa-home"></i></span>
                <span class="homestyle">Home</span>
              </div>
            </li>
            <!--  ------------------------------------- Home complate -->

            <li>
              <div class="Explore">
                <span><i class="fas fa-hashtag"></i></span>
                <span style="padding-left: 20px">Explore</span>
              </div>
            </li>

            <!-- ------------------------------------------------- -->

            <li>
              <div class="Notifications">
                <span ><i class="far fa-bell"></i></span>
                <span style="padding-left: 20px">Notifications</span>
              </div>
            </li>




            <div  class="Messages">
              <span  ><i class="far fa-envelope"></i></span>
              <span style="padding-left: 20px">Messages</span>
            </div>
          </li>
           <!-- ------------------------------------------------- -->
          <li  >
            <div class=" Bookmarks">
              <span  ><i class="far fa-bookmark"></i></span>
              <span  style="padding-left: 24px">Bookmarks</span>
            </div>
          </li>


          <!-- --------------------------------------- -->
          <li >
            <div class="Lists" >
              <span  ><i class="far fa-list-alt"></i></span>
              <span  style="padding-left: 20px">Lists</span>
            </div>
            <!-- --------------------------------------- -->
          </li>
          <li >
            <div class="Profile">
              <span  ><i class="far fa-user"></i></span>
              <span style="padding-left: 20px">Profile</span>
            </div>
          </li>
          <li >
            <div class="More">
              <span class="icon"><i class="fas fa-ellipsis-h"></i></span>
              <span  style="padding-left: 20px">More</span>
            </div>
          </li>
          <li>
            <div class="button" >
              
              <button  type="button" class="btn btn-lg btn-primary rounded-pill button1 "> Tweet</button>
                
               
            </div>
          </li>

          <li >
            <div class="Profile1">
              <span  ><i class="fas fa-user-circle"></i></span>
              <span style="padding-left: 10px"> <span>Mian Asad Iqbal</span> </span>
            </div>
          </li>





          </ul>
        </nav>
      </div>
      <div id="center">
        <div>
          <h5 style="font-weight: bolder" class="m-lg-3 font-weight-bolder">
            Home
          </h5>
          <hr style="color: black" width="100%" />
        </div>
      </div>
      <div id="rightSide"><h3>Content</h3></div>
    </div>

    <!-- Optional JavaScript; choose one of the two! -->

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
      crossorigin="anonymous"
    ></script>
    <!-- Option 2: Separate Popper and Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js"
      integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js"
      integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
